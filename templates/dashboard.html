<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fall 2026 Section Tracker</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div id="app-root">
  <header>
    <div class="header-left">
      <h1>Section Tracker</h1>
      <span class="subtitle" id="subtitle">Fall 2026 · loading…</span>
    </div>
    <div class="header-right">
      <span class="last-updated" id="last-updated"></span>
      <span class="badge-dot" id="store-badge" title="Notes store"><span class="dot"></span><span id="store-label">notes</span></span>
      <button class="header-secondary-btn" id="connect-btn" onclick="connectNow()">↻ Update data</button>
    </div>
  </header>

  <main>
    <div class="pipeline-row">
      <div class="pipeline-bar" id="pipeline-bar"></div>
    </div>

    <div class="controls-section">
      <div class="button-row" id="level-row">
        <span class="row-label">Level</span>
        <button class="type-btn active" data-v="" onclick="setLevel('')">All</button>
        <button class="type-btn" data-v="GR" onclick="setLevel('GR')">Graduate</button>
        <button class="type-btn" data-v="UG" onclick="setLevel('UG')">Undergraduate</button>
      </div>
      <div class="button-row" id="resolved-row">
        <span class="row-label">Resolved</span>
        <button class="proposal-btn active-all" data-v="" onclick="setResolved('')">All</button>
        <button class="proposal-btn" data-v="no" onclick="setResolved('no')">Unresolved</button>
        <button class="proposal-btn" data-v="yes" onclick="setResolved('yes')">Resolved</button>
        <button class="proposal-btn" data-v="notes" onclick="setResolved('notes')">Has notes</button>
      </div>
      <div class="button-row" id="views-row">
        <span class="row-label">Views</span>
        <span id="view-buttons" style="display:contents"></span>
      </div>
      <div class="filters">
        <div class="filter-group"><label>College</label><select id="f-college"><option value="">All</option></select></div>
        <div class="filter-group"><label>Campus</label><select id="f-campus"><option value="">All</option></select></div>
        <div class="filter-group"><label>Subject</label><select id="f-subject"><option value="">All</option></select></div>
        <div class="filter-group"><label>Search</label><input type="text" id="f-search" placeholder="course, title, CRN, faculty…"></div>
        <button class="header-secondary-btn" onclick="clearFilters()">Clear</button>
      </div>
    </div>

    <div class="summary" id="summary"></div>

    <div class="table-wrap">
      <table>
        <thead><tr id="thead-row"></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
  window._isAdmin = {{ 'true' if is_admin else 'false' }};
  window._staticMode = false;
  window._apiBase = '';
</script>
<script src="/static/app.js"></script>
</body>
</html>
