<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fall 2026 Section Tracker</title>
<link rel="stylesheet" href="/static/style.css?v={{ cb }}">
</head>
<body class="filters-collapsed">
<div id="app-root">
  <header>
    <div class="header-left">
      <div class="header-name">
        <h1>Section Tracker</h1>
      </div>
      <div id="freshness-row" class="freshness-row">
        <span id="last-updated" class="last-updated"></span>
        <span id="app-build" class="last-updated"></span>
      </div>
    </div>
    <div class="header-search">
      <input type="text" id="f-search" placeholder="Search course, title, CRN, faculty…">
    </div>
    <div class="header-right">
      <button class="conn-btn" id="tableau-status" onclick="checkTableau()" title="Tableau (data source) connection — click to re-check"><span class="dot"></span><span id="tableau-status-label">Checking…</span></button>
      <button class="conn-btn" id="store-badge" onclick="checkAirtable()" title="Airtable (notes store) connection — click to re-check"><span class="dot"></span><span id="store-label">Checking…</span></button>
      <button class="header-secondary-btn" id="console-btn" onclick="openConsoleModal()">Console</button>
    </div>
  </header>

  <!-- Console modal (local-only, hidden on static site) -->
  <div id="console-modal" class="modal-overlay" style="display:none" onclick="closeConsoleModalIfBackdrop(event)">
    <div class="modal-panel" style="max-width:640px" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h2>Console</h2>
        <button class="modal-close" onclick="closeConsoleModal()">&times;</button>
      </div>
      <div class="modal-body" id="console-modal-body" style="font-size:13px">Loading…</div>
    </div>
  </div>

  <!-- Views modal (filter-tree builder, mirrors the program tracker) -->
  <div id="pv-modal-backdrop" class="pv-modal-backdrop" onclick="if(event.target===this)closeViewsModal()">
    <div class="pv-modal" role="dialog" aria-modal="true" aria-label="Views">
      <div class="pv-modal-header">
        <span class="pv-modal-title">Views</span>
        <span class="pv-modal-count" id="pv-modal-count"></span>
        <button class="pv-modal-x" onclick="closeViewsModal()" aria-label="Close">×</button>
      </div>
      <div class="pv-modal-body">
        <aside class="pv-modal-sidebar" id="pv-modal-sidebar"></aside>
        <div class="pv-modal-maincol">
          <div class="pv-modal-main" id="pv-modal-main"></div>
          <div class="pv-modal-footer" id="pv-modal-footer"></div>
        </div>
      </div>
    </div>
  </div>

  <main>
    <div id="source-banner"></div>

    <!-- Starred-view tiles (quick-apply) — shown above the filters -->
    <div id="view-tiles" class="portfolio-view-tiles" style="display:none"></div>

    <!-- Collapsible filter panel. Defaults closed; always collapsed on page load. -->
    <div id="filter-toggle-row">
      <button id="filter-toggle-btn" onclick="toggleFilters()">▸ Filters</button>
    </div>
    <div class="controls-section" id="controls-section">
      <div class="button-row" id="term-row"><!-- multi-select term buttons injected by JS --></div>
      <div class="button-row" id="resolved-row">
        <span class="row-label">Resolved</span>
        <button class="proposal-btn active-all" data-v="" onclick="setResolved('')">All</button>
        <button class="proposal-btn" data-v="no" onclick="setResolved('no')">Unresolved</button>
        <button class="proposal-btn" data-v="yes" onclick="setResolved('yes')">Resolved</button>
        <button class="proposal-btn" data-v="notes" onclick="setResolved('notes')">Has notes</button>
      </div>
      <div class="button-row" id="level-row">
        <span class="row-label">Level</span>
        <button class="proposal-btn active-all" data-v="" onclick="setLevel('')">All</button>
        <button class="proposal-btn" data-v="UG" onclick="setLevel('UG')">Undergraduate</button>
        <button class="proposal-btn" data-v="GR" onclick="setLevel('GR')">Graduate</button>
      </div>
      <div class="filters">
        <div class="filter-group"><label>Modality</label><select id="f-modality"></select></div>
        <div class="filter-group"><label>Special Topics<sup class="info-i" id="f-special-info">i</sup></label><select id="f-special"><option value="">All</option><option value="Y">Special topics only</option><option value="N">Not special topics</option></select></div>
        <div class="filter-group"><label>College</label><select id="f-college"><option value="">All</option></select></div>
        <div class="filter-group"><label>Campus</label><select id="f-campus"><option value="">All</option></select></div>
        <div class="filter-group"><label>Subject</label><select id="f-subject"><option value="">All</option></select></div>
        <button class="header-secondary-btn" onclick="clearFilters()">Clear</button>
      </div>
    </div>

    <div class="table-toolbar">
      <div class="summary" id="summary"></div>
      <div class="table-actions">
        <div class="portfolio-col-picker" id="section-col-picker" style="position:relative">
          <button class="portfolio-col-picker-btn" onclick="toggleSectionColPicker(event)">⊞ Columns ▾</button>
          <div class="portfolio-col-dropdown" id="section-col-dropdown"></div>
        </div>
        <button class="header-secondary-btn" onclick="exportSectionsCsv()" title="Export filtered rows to CSV">⤓ Export</button>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead><tr id="thead-row"></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
  window._isAdmin = {{ 'true' if is_admin else 'false' }};
  window._staticMode = false;
  window._apiBase = '';
</script>
<script src="/static/app.js?v={{ cb }}"></script>
</body>
</html>
