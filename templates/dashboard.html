<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fall 2026 Section Tracker</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div id="app-root">
  <header>
    <div class="header-left">
      <h1>Fall 2026 Section Tracker</h1>
      <span class="subtitle" id="subtitle">loading…</span>
    </div>
    <div class="header-right">
      <span class="last-updated" id="last-updated"></span>
      <span class="badge-dot" id="store-badge" title="Notes store"><span class="dot"></span><span id="store-label">notes</span></span>
      <button class="btn btn-primary" id="connect-btn" onclick="connectNow()">↻ Update data</button>
    </div>
  </header>

  <main>
    <div class="modality-bar" id="modality-bar"></div>

    <div class="view-tiles" id="view-tiles"></div>

    <div class="controls">
      <div class="filter-row" id="filter-row">
        <label>College<select id="f-college"><option value="">All</option></select></label>
        <label>Campus<select id="f-campus"><option value="">All</option></select></label>
        <label>Subject<select id="f-subject"><option value="">All</option></select></label>
        <label>Modality<select id="f-modality"><option value="">All</option></select></label>
        <label>Resolved<select id="f-resolved"><option value="">All</option><option value="yes">Resolved</option><option value="no">Unresolved</option><option value="notes">Has notes</option></select></label>
        <label>Level
          <span class="seg" id="seg-level">
            <button data-v="" class="active">All</button>
            <button data-v="GR">Graduate</button>
            <button data-v="UG">Undergrad</button>
          </span>
        </label>
        <label>Search<input type="text" id="f-search" placeholder="course, title, CRN, faculty…"></label>
        <button class="btn" onclick="clearFilters()">Clear</button>
      </div>
    </div>

    <div class="summary" id="summary"></div>

    <div class="table-wrap">
      <table>
        <thead><tr id="thead-row"></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
  window._isAdmin = {{ 'true' if is_admin else 'false' }};
  window._staticMode = false;
  window._apiBase = '';
</script>
<script src="/static/app.js"></script>
</body>
</html>
